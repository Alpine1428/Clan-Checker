name: Build Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload mod JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: clan-checker-mod
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Get version
        id: version
        run: echo "version=$(grep '^version' build.gradle | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: "Build #${{ github.run_number }} - v${{ steps.version.outputs.version }}"
          body: |
            Automatic build from commit ${{ github.sha }}
            
            **Download the JAR file below and put it in your `mods` folder.**
            
            Requires:
            - Minecraft 1.20.1
            - Fabric Loader 0.15+
            - Fabric API
          files: build/libs/!(*-sources).jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
